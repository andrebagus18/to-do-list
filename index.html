<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To Do List</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Oswald:wght@200..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap");
    </style>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=close"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=close"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=keyboard_arrow_down"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="today.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <div class="tab-header">
          <h1>Name</h1>
          <h3 class="status">Jabatan</h3>
          <div id="date"></div>
          <button id="hapus" type="reset">hapus</button>
        </div>
      </header>
      <main>
        <div class="tab-create">
          <!-- <div class="btn-new">
            <button type="button" class="btn-create">New Task</button>
          </div> -->
          <div class="create">
            <div class="create-new">
              <div class="create-task">
                <div class="close">
                  <button type="button" class="btn-close">
                    <span class="material-symbols-outlined"> close </span>
                  </button>
                </div>
                <form action="" method="post" id="newData">
                  <input
                    type="text"
                    name="newTask"
                    id="newTask"
                    class="task"
                    placeholder="Create Task"
                  />
                  <div class="level">
                    <div class="form-group" id="levels">
                      <label for="category" class="select">
                        <select name="category" id="category">
                          <option value="noCategory">
                            -- Select Category --
                          </option>
                          <option value="low">Low</option>
                          <option value="medium">Medium</option>
                          <option value="high">High</option>
                        </select></label
                      >
                    </div>
                  </div>
                  <input
                    type="date"
                    name="date"
                    class="input-date"
                    id="dateToday"
                    placeholder="Date"
                  />
                  <button type="submit" class="btn-submit">Submit</button>
                </form>
              </div>
            </div>
          </div>
        </div>
        <div class="dashboard">
          <div class="tab-today">
            <table id="tableToday" class="table">
              <thead>
                <tr>
                  <th class="title" colspan="2">
                    Today
                    <span class="material-symbols-outlined down-arrow">
                      keyboard_arrow_down
                    </span>
                  </th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
          <div class="tab-done">
            <table id="tableDone" class="table">
              <thead>
                <tr>
                  <th class="title" colspan="2">
                    Done
                    <span class="material-symbols-outlined down-arrow">
                      keyboard_arrow_down
                    </span>
                  </th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
          <div class="new-task">
            <div class="new btn-create">
              <a href="#">+</a>
            </div>
          </div>
        </div>
      </main>
      <footer>
        <p class="my-day">My Daily</p>
      </footer>
    </div>

    <script src="main.js"></script>
  </body>
</html>
