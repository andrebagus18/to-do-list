<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To Do List</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Oswald:wght@200..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap");
    </style>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <div class="tab-header">
          <h1>Name</h1>
          <h3>Jabatan</h3>
          <div class="date"></div>
        </div>
      </header>
      <main>
        <div class="tab-create">
          <div class="btn-new">
            <button class="btn-create">New Task</button>
          </div>
          <div class="create">
            <div class="create-task">
              <form action="" method="get">
                <input
                  type="text"
                  id="task"
                  class="task"
                  placeholder="Create Task"
                />
                <div class="level">
                  <div class="l-level level1">
                    <input type="radio" name="low" id="low" />
                    <label for="low" class="low">Low</label>
                  </div>
                  <div class="m-level level2">
                    <input type="radio" name="medium" id="medium" />
                    <label for="medium" class="medium">Medium</label>
                  </div>
                  <div class="h-level level3">
                    <input type="radio" name="low" id="low" />
                    <label for="high" class="high">High</label>
                  </div>
                </div>
                <label for="date">Date</label>
                <input type="date" name="date" />
              </form>
            </div>
            <button type="submit" class="btn-submit">Submit</button>
          </div>
        </div>
        <div class="tab-today">
          <div class="today">
            <h2 class="title">Today</h2>
            <a href="">
              <img src="" alt="" />
            </a>
          </div>
          <div class="list-today">
            <div class="today1">
              <input type="radio" id="today1" name="today1" />
              <label for="today1" class="today1"></label>
            </div>
          </div>
        </div>
        <div class="tab-done">
          <div class="done">
            <h2 class="title">Done</h2>
            <a href="">
              <img src="" alt="" />
            </a>
          </div>
          <div class="list-done">
            <div class="done1">
              <input type="radio" id="done1" name="done1" />
              <label for="done1" class="done1"></label>
            </div>
          </div>
        </div>
        <div class="new">
          <a href=""></a>
        </div>
      </main>
      <footer>
        <p class="my-day">My Day</p>
      </footer>
    </div>
  </body>
</html>
